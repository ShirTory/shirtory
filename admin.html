<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ShirTory Admin — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a0a0a;--surface:#141414;--ink:#f0ece4;--muted:#777;--accent:#e63946;--border:#222;--radius:10px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column}
    a{color:inherit;text-decoration:none}
    button{cursor:pointer;border:none;font:inherit}

    .login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
    .login-box{
      background:var(--surface);border:1px solid var(--border);border-radius:18px;
      padding:48px 40px;width:100%;max-width:420px;
    }
    .login-logo{text-align:center;margin-bottom:32px}
    .login-logo h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700}
    .login-logo h1 span{color:var(--accent)}
    .login-logo p{color:var(--muted);font-size:.85rem;margin-top:6px}

    .login-tabs{display:flex;background:#0f0f0f;border-radius:8px;padding:4px;margin-bottom:28px;gap:4px}
    .tab-btn{flex:1;padding:9px;border-radius:6px;font-size:.82rem;font-weight:500;color:var(--muted);background:none;transition:all .2s;text-align:center}
    .tab-btn.active{background:var(--accent);color:#fff}

    label{display:block;font-size:.78rem;font-weight:500;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;margin-top:18px}
    input{
      width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);
      background:#0f0f0f;color:var(--ink);font:inherit;font-size:.92rem;
      transition:border-color .2s;
    }
    input:focus{outline:none;border-color:var(--accent)}
    .pw-wrap{position:relative}
    .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;color:var(--muted);font-size:.85rem;padding:4px}

    .btn-login{
      width:100%;margin-top:24px;padding:14px;
      background:var(--accent);color:#fff;border-radius:var(--radius);
      font-size:.92rem;font-weight:600;letter-spacing:.04em;
      transition:opacity .2s;
    }
    .btn-login:hover{opacity:.88}
    .error-msg{color:#ff6b6b;font-size:.82rem;text-align:center;margin-top:12px;display:none}

    .back-link{text-align:center;margin-top:20px;font-size:.8rem;color:var(--muted)}
    .back-link a{color:var(--accent)}

    .footer-txt{text-align:center;padding:20px;font-size:.75rem;color:var(--border)}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <h1>Shir<span>Tory</span></h1>
      <p>Admin Panel — Secure Login</p>
    </div>

    <div class="login-tabs">
      <button class="tab-btn active" onclick="setRole('admin',this)">🔐 Master Admin</button>
      <button class="tab-btn" onclick="setRole('moderator',this)">🛡️ Moderator</button>
    </div>

    <div id="roleHint" style="background:#e6394615;border:1px solid #e6394640;border-radius:8px;padding:10px 14px;font-size:.78rem;color:#e63946;margin-bottom:4px">
      Master Admin — Full access to all settings
    </div>

    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username"/>

    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/>
      <button class="pw-toggle" onclick="togglePW()">👁</button>
    </div>

    <button class="btn-login" onclick="login()">Login →</button>
    <p class="error-msg" id="errorMsg">❌ Wrong username or password</p>

    <p class="back-link"><a href="index.html">← Back to Store</a></p>
  </div>
</div>
<p class="footer-txt">ShirTory Admin Panel © 2026</p>

<script>
let selectedRole = 'admin';

const DEFAULT_USERS = [
  {username:'admin',password:'shirtory2026',role:'master_admin',name:'Master Admin'},
  {username:'mod1',password:'mod123',role:'moderator',name:'Moderator 1'},
];

function getUsers(){
  return JSON.parse(localStorage.getItem('shirtory_users')||JSON.stringify(DEFAULT_USERS));
}

function setRole(role,btn){
  selectedRole = role;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const hint = document.getElementById('roleHint');
  if(role==='admin'){
    hint.textContent='Master Admin — Full access to all settings';
    hint.style.color='#e63946'; hint.style.borderColor='#e6394640'; hint.style.background='#e6394615';
  } else {
    hint.textContent='Moderator — Can manage products & view orders';
    hint.style.color='#f4a261'; hint.style.borderColor='#f4a26140'; hint.style.background='#f4a26115';
  }
}

function togglePW(){
  const inp = document.getElementById('password');
  inp.type = inp.type==='password' ? 'text' : 'password';
}

function login(){
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('errorMsg');
  errEl.style.display='none';

  const users = getUsers();
  const user = users.find(u=>u.username===username && u.password===password);

  if(!user){ errEl.style.display='block'; return; }

  const isAdminRole = selectedRole==='admin';
  const isMasterAdmin = user.role==='master_admin';
  const isMod = user.role==='moderator';

  if(isAdminRole && !isMasterAdmin){ errEl.textContent='❌ This account is not a Master Admin'; errEl.style.display='block'; return; }
  if(!isAdminRole && !isMod){ errEl.textContent='❌ This account is not a Moderator'; errEl.style.display='block'; return; }

  // Save session
  sessionStorage.setItem('shirtory_session', JSON.stringify({
    username:user.username, role:user.role, name:user.name, loginTime:Date.now()
  }));
  window.location.href='dashboard.html';
}

// Auto-focus
window.onload = ()=>{ document.getElementById('username').focus(); }
</script>
</body>
</html>
